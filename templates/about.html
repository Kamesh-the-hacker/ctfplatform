{% extends "base.html" %}
{% block content %}

<h2 class="page-title">ABOUT</h2>

<div class="terminal">

    <div id="output">
        <p>> type <b>help</b> to start</p>
    </div>

    <div class="input-line">
        <span>> </span>
        <input id="cmd" autofocus placeholder="enter command">
    </div>

</div>

<script>
const input = document.getElementById("cmd");
const output = document.getElementById("output");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        let cmd = input.value.trim().toLowerCase();
        let res = "";

        if (cmd === "help") {
            res = "Commands: help, whoami, contact, github, youtube, clear";
        }
        else if (cmd === "whoami") {
            res = "Kamesh - Cybersecurity Enthusiast & Developer";
        }
        else if (cmd === "contact") {
            res = "Email: kameshsk6512@gmail.com";
        }
        else if (cmd === "github") {
            res = 'GitHub: <a href="https://github.com/kamesh-the-hacker" target="_blank">kamesh-the-hacker</a>';
        }
        else if (cmd === "youtube") {
            res = 'YouTube: <a href="https://youtube.com/@vangahackpannalam" target="_blank">vangahackpannalam</a>';
        }
        else if (cmd === "clear") {
            output.innerHTML = "";
            input.value = "";
            return;
        }
        else {
            res = "Command not found";
        }

        output.innerHTML += `<p>> ${cmd}</p><p>${res}</p>`;
        input.value = "";
        output.scrollTop = output.scrollHeight;
    }
});
</script>

{% endblock %}
