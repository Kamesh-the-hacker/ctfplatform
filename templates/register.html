{% extends "base.html" %}
{% block content %}

<div class="card register-box">

    <h2>REGISTER</h2>

    <form method="POST" class="form-box">
        <input name="username" placeholder="CHOOSE USERNAME" required minlength="8">
        <input name="password" type="password" placeholder="CREATE PASSWORD" required minlength="8">
        <button>CREATE ACCOUNT</button>
    </form>

    <!-- ❌ ERROR MESSAGE (same page) -->
    {% if msg %}
    <div class="msg error">
        <p>{{msg}}</p>
    </div>
    {% endif %}

    <!-- 🔥 FLASH MESSAGE (optional if redirected back) -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg success">
          {% for m in messages %}
            <p>{{m}}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

</div>

{% endblock %}
